{% load static %}
<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Açaí Stock</title>
    <link rel="stylesheet" href="{% static 'css/theme.css' %}">
    <link rel="stylesheet" href="{% static 'css/base.css' %}">
</head>
<body class="login-body">
    <div class="login-card">
        <div class="login-logo"><span>🫐</span></div>
        <h1 class="login-title">Açaí Stock</h1>
        <p class="login-subtitle">Sistema de Gestão de Estoque</p>

        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label class="form-label" for="id_username">Usuário</label>
                <input type="text" name="username" autofocus autocapitalize="none"
                       id="id_username" class="form-input" placeholder="seu@email.com"
                       value="{{ form.username.value|default:'' }}">
            </div>
            <div class="form-group">
                <label class="form-label" for="id_password">Senha</label>
                <input type="password" name="password" id="id_password"
                       class="form-input" placeholder="••••••••">
            </div>

            {% if form.errors %}
                <div class="message message-error">
                    Usuário ou senha inválidos.
                </div>
            {% endif %}

            <button type="submit" class="btn btn-primary btn-full">Entrar</button>
        </form>
    </div>
</body>
</html>
